name: Flutter Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'  # match your project's Flutter version
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code (optional but recommended)
        run: flutter analyze

      - name: Run tests (optional)
        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Email APK
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ajithkumar.r@gemicates.in
          password: Ajith@01
          subject: "New Flutter Build - ${{ github.repository }}"
          to: ajithkumar.r@gemicates.in
          from: Flutter CI
          body: "New APK build attached. Commit: ${{ github.sha }}"
          attachments: build/app/outputs/flutter-apk/app-release.apk